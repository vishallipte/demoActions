name: Test Connection to Windows VM

on:
  push:  # This allows you to trigger it manually from the GitHub Actions UI

jobs:
  ping-vm:
    # Targets your specific Windows Server VM via the label you created
    runs-on: test

    steps:
      - name: Print Welcome Message
        run: echo "Hello! The GitHub Actions runner is successfully executing code on this machine."

      - name: Verify VM IP Address
        shell: powershell
        run: |
          echo "Checking the local IP address of this machine..."
          # This filters out your IP addresses to confirm it matches 10.14.91.51
          Get-NetIPAddress -AddressFamily IPv4 | Select-Object IPAddress

      - name: Print Current Environment Details
        shell: powershell
        run: |
          echo "Current working directory:"
          pwd
          echo "Computer Name:"
          hostname
